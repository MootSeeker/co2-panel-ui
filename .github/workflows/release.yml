name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create learner package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test before release
        run: cargo test --workspace --all-targets

      - name: Verify release build
        run: cargo build --workspace --release

      - name: Build release package
        run: scripts/package-release.sh
        env:
          RELEASE_VERSION: "main-${{ github.run_number }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: "release-main-${{ github.run_number }}"
          RELEASE_TITLE: "CO2 Panel main #${{ github.run_number }}"
        run: |
          gh release create "$RELEASE_TAG" \
            dist/co2-panel-main-${{ github.run_number }}.tar.gz \
            --title "$RELEASE_TITLE" \
            --notes "Automatisches Release fuer Commit ${{ github.sha }} auf main."
